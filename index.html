<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pokédex API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>
<style>
    #foto-poke {
        display:block;
        /* Transforma em bloco */
        margin:0 auto;
        /* Centraliza horizontalmente */
    }
</style>
<body class="bg-dark text-white p-5">
    <div class="container text-center" style="max-width: 500px">
        <h1 class="text-warning mb-4">Pokémon Hunter</h1>

        <input type="text" id="in-pokemon" class="form-control mb-3" placeholder="Digite o nome (ex: Pikachu) ou número...">
        <button onclick="buscarPokemon()" class="btn btn-danger w-100 mb-4">Buscar no servidor</button>

        <div id="tela-resultado" class="card bg-secondary text-white p-3 shadow">
            <p>Aguardando busca...</p>
        </div>
    </div>

<script>
    let pokemonAtual = null;
    let modoShiny = false;
    // A palavra "async" avisa o navegador: "Essa função vai demorar, não trave a tela!"
    async function buscarPokemon() {
        let pokemonDigitado = document.getElementById('in-pokemon').value.toLowerCase();
        let urlApi=`
        https://pokeapi.co/api/v2/pokemon/${pokemonDigitado}`;

        // O 'await' faz o código pausar NESSA linha até o servidor responder
        let tela = document.getElementById('tela-resultado');
        let resposta = await fetch(urlApi);
        if (resposta.ok === false) {
            tela.innerHTML= `
            <h3 class="text">Pokémon não encontrado!</h3>`;
            return;
        }

        // A resposta vem criptografada da internet. Precisamos traduzir para JSON!
        let dadosJson = await resposta.json();

        // Vamos ver os dados puros no console (F12) antes de desenhar a tela
        console.log(dadosJson);

        pokemonAtual = dadosJson;

        desenharNaTela(dadosJson);
    }
    function desenharNaTela(dados) {
        let tela = document.getElementById('tela-resultado');
        let tipos = [];
        for (i = 0; i < dados.types.length; i++) {
            let nome = dados.types[i].type.name;
            nome = nome.charAt(0).toUpperCase() + nome.slice(1);
            // Transforma ["electric", "steel"] → "electric, steel"
            tipos.push(nome);
        }
        // Transforma ["electric", "steel"] → "electric, steel"
        tipos = tipos.join(", ");

        // Usamos as crases (``) para injetar as variáveis do JSON.
        // A PokeAPI guarda a foto no caminho: sprites.front_default
        tela.innerHTML= `
        <h3>${dados.name.toUpperCase()}</h3>
        <img id="foto-poke" src="${dados.sprites.front_default}" alt="Foto do Pokémon" width="200">
        <p><strong>Peso:</strong> ${dados.weight / 10} kg </p>
        <p><strong>Tipagem:</strong> ${tipos} </p>
        <button id="btn-shiny" onclick="mudarParaShiny()" class="btn btn-warning w-100 mb-4">Ver versão shiny</button> 
        `;
    }
    function mudarParaShiny() {
        let botao = document.getElementById('btn-shiny');
        let img = document.getElementById('foto-poke');
        modoShiny = !modoShiny;
        if (modoShiny) {
            img.src = pokemonAtual.sprites.front_shiny; 
            botao.innerText = "Ver versão normal";
        } else {
            img.src = pokemonAtual.sprites.front_default;
            botao.innerText = "Ver versão shiny";
        }
    }

</script>

</body>
</html>
